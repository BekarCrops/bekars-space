name: CI

on:
    pull_request:
        branches: [master]

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.x

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 18
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Prettier
              run: pnpm format:check

            - name: Type check
              run: pnpm tsc --noEmit

            - name: Lint
              run: pnpm lint
